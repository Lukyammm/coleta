<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="light">
<meta name="theme-color" content="#f4f6f3">
<title>Clinify</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1d2a24; 
  --paper: #f4f6f3; 
  --card: #ffffff; 
  --line: #e0e6e0; 
  --mut: #68766e;
  --pri: #2b6cb0; 
  --pri-d: #1a4971; 
  --pri-s: #e6eef7;
  --red: #e53e3e; 
  --red-s: #fce8e8;
  --green: #38a169;
  --green-s: #e6f6ec;
  --amber: #d69e2e;
  --amber-s: #fefcbf;
  --r: 16px; 
  --sh: 0 1px 2px rgba(29,42,36,.06), 0 4px 14px rgba(29,42,36,.05);
  --sh-lift: 0 6px 16px rgba(29,42,36,.10), 0 2px 5px rgba(29,42,36,.06);
  --disp: 'Inter', system-ui, sans-serif; 
  --body: 'Inter', system-ui, sans-serif;
  --mono: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
  --tap: 48px;
  --sa-t: env(safe-area-inset-top, 0px);
  --sa-r: env(safe-area-inset-right, 0px);
  --sa-b: env(safe-area-inset-bottom, 0px);
  --sa-l: env(safe-area-inset-left, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body { font-family: var(--body); background: var(--paper); color: var(--ink); font-size: 16px; line-height: 1.55; min-height: 100vh; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
button { font-family: inherit; cursor: pointer; touch-action: manipulation; }
input, select, textarea { font-family: inherit; font-size: 16px; color: var(--ink); max-width: 100%; }
h1, h2, h3 { font-family: var(--disp); line-height: 1.2; letter-spacing: -.01em; }
:focus-visible { outline: 2px solid var(--pri); outline-offset: 2px; border-radius: 4px; }
.hide { display: none !important; }

/* ---------- topbar ---------- */
.topbar { position: sticky; top: 0; z-index: 40; background: rgba(244,246,243,.92); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); border-bottom: 1px solid var(--line); padding-top: var(--sa-t); }
.topbar .in { max-width: 800px; margin: 0 auto; display: flex; align-items: center; gap: 10px; padding: 12px max(18px, var(--sa-r)) 12px max(18px, var(--sa-l)); }
.brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: inherit; }
.brand .dot { width: 34px; height: 34px; color: var(--pri); display: grid; place-items: center; background: var(--pri-s); border-radius: 8px; }
.brand .dot svg { width: 20px; height: 20px; stroke-width: 2.2; }
.brand b { font-family: var(--disp); font-weight: 700; font-size: 18px; }
.brand small { display: block; color: var(--mut); font-size: 11px; letter-spacing: .06em; text-transform: uppercase; font-weight: 600; margin-top: -2px; }
.top-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.iconbtn { background: none; border: 0; padding: 8px; border-radius: 10px; color: var(--mut); display: grid; place-items: center; transition: .15s; min-width: var(--tap); min-height: var(--tap); }
.iconbtn:hover { background: var(--card); color: var(--ink); box-shadow: var(--sh); }
.iconbtn svg { width: 20px; height: 20px; stroke-width: 2; }

/* ---------- layout ---------- */
main { max-width: 800px; margin: 0 auto; padding: 24px max(18px, var(--sa-r)) calc(90px + var(--sa-b)) max(18px, var(--sa-l)); }
.narrow { max-width: 500px; margin: 0 auto; }
.card { background: var(--card); border: 1px solid var(--line); border-radius: var(--r); box-shadow: var(--sh); padding: 24px; }
.header-txt { text-align: center; margin-bottom: 24px; }
.header-txt h2 { font-size: 1.4rem; color: var(--pri); margin-bottom: 4px; }
.header-txt p { color: var(--mut); font-size: 0.95rem; }

/* ---------- forms ---------- */
.field { margin-bottom: 18px; }
.field > label { display: block; font-weight: 600; font-size: 13.5px; margin-bottom: 6px; }
.field input, .field textarea { width: 100%; border: 1px solid var(--line); border-radius: 12px; padding: 14px 16px; min-height: 48px; background: #fff; transition: border-color .15s, box-shadow .15s; -webkit-appearance: none; }
.field textarea { min-height: 100px; resize: vertical; }
.field input:focus, .field textarea:focus { border-color: var(--pri); outline: none; box-shadow: 0 0 0 3px rgba(43, 108, 176, .15); }

/* ---------- buttons ---------- */
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; background: var(--pri); color: #fff; border: 1px solid var(--pri); border-radius: 12px; padding: 14px 20px; min-height: 52px; font-weight: 600; font-size: 15px; transition: .15s; width: 100%; }
.btn:hover { background: var(--pri-d); transform: translateY(-1px); box-shadow: var(--sh); }
.btn:active { transform: scale(0.98); }
.btn:disabled { opacity: .6; cursor: not-allowed; transform: none; }
.btn.ghost { background: var(--paper); color: var(--ink); border-color: var(--line); margin-top: 10px; }
.btn.ghost:hover { border-color: var(--mut); background: var(--card); }
.btn.sm { min-height: 36px; padding: 6px 14px; border-radius: 8px; font-size: 13px; width: auto; }
.btn.success { background: var(--green); border-color: var(--green); color: #fff; }
.btn.success:hover { background: #2f855a; }

.spin { width: 16px; height: 16px; border: 2.5px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; display: inline-block; animation: sp .7s linear infinite; }
@keyframes sp { to { transform: rotate(360deg); } }

/* ---------- success ---------- */
.done { text-align: center; padding: 38px 22px; }
.done .ok { width: 68px; height: 68px; border-radius: 50%; background: var(--green-s); color: var(--green); display: grid; place-items: center; margin: 0 auto 16px; }
.done .ok svg { width: 34px; height: 34px; stroke-width: 2.5; }
.done .proto { font-family: var(--mono); font-size: clamp(24px, 7vw, 30px); font-weight: 700; letter-spacing: .04em; color: var(--pri-d); margin: 8px 0 16px; overflow-wrap: anywhere; }

/* ---------- admin dashboard ---------- */
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-bottom: 24px; }
.stat { background: #fff; border: 1px solid var(--line); border-radius: 14px; padding: 16px; box-shadow: var(--sh); }
.stat .v { font-family: var(--disp); font-weight: 700; font-size: clamp(24px, 6vw, 32px); line-height: 1.1; color: var(--pri); }
.stat .l { color: var(--mut); font-size: 12.5px; font-weight: 600; letter-spacing: .03em; text-transform: uppercase; margin-top: 4px; }

.appbar { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 16px; }
.appbar h2 { font-size: clamp(19px, 5vw, 22px); }

/* Tabs & Search */
.controls { display: flex; flex-direction: column; gap: 16px; margin-bottom: 24px; }
.tabs { display: flex; gap: 4px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
.tabs::-webkit-scrollbar { display: none; }
.tabs button { border: 0; background: none; padding: 8px 16px; min-height: var(--tap); border-radius: 10px; font-size: 14.5px; font-weight: 600; color: var(--mut); white-space: nowrap; transition: .12s; }
.tabs button.on { background: var(--ink); color: #fff; }
.tabs button:hover:not(.on) { background: var(--card); }
.search-bar { position: relative; width: 100%; }
.search-bar input { padding-left: 40px; }
.search-bar svg { position: absolute; left: 14px; top: 14px; width: 20px; height: 20px; color: var(--mut); }

/* Badges */
.badge { display: inline-flex; align-items: center; border-radius: 999px; padding: 4px 10px; font-size: 11px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; }
.b-warn { background: var(--amber-s); color: var(--amber); }
.b-ok { background: var(--green-s); color: var(--green); }
.b-neutral { background: var(--line); color: var(--mut); }

/* pgrid (mobile friendly table) */
.pgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(min(100%, 300px), 1fr)); gap: 14px; }
.pcard { background: #fff; border: 1px solid var(--line); border-left: 5px solid var(--pri); border-radius: 12px; padding: 16px; transition: .12s; box-shadow: var(--sh); display: flex; flex-direction: column; }
.pcard:hover { border-color: var(--mut); transform: translateY(-2px); }
.pcard .top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.pcard .id { font-family: var(--mono); font-size: 13px; font-weight: 700; color: var(--pri-d); }
.pcard .date { font-size: 12px; color: var(--mut); margin-left: auto; }
.pcard b { font-size: 16px; display: block; margin-bottom: 4px; color: var(--ink); }
.pcard .info { color: var(--mut); font-size: 13.5px; display: flex; gap: 6px; align-items: center; margin-bottom: 12px; }
.pcard .info svg { width: 14px; height: 14px; }
.pcard .desc { font-size: 14px; background: var(--paper); padding: 10px; border-radius: 8px; color: var(--ink); border: 1px solid var(--line); margin-bottom: 12px; }
.pcard-actions { margin-top: auto; display: flex; gap: 8px; justify-content: flex-end; border-top: 1px solid var(--line); padding-top: 12px; }

/* ---------- toast ---------- */
#toast { position: fixed; bottom: 30px; left: 50%; transform: translate(-50%, 100px); background: var(--ink); color: #fff; padding: 12px 24px; border-radius: 99px; font-weight: 600; font-size: 14px; opacity: 0; transition: .4s cubic-bezier(.4,0,.2,1); z-index: 1000; box-shadow: var(--sh-lift); pointer-events: none; }
#toast.show { transform: translate(-50%, 0); opacity: 1; }
#toast.err { background: var(--red); }
</style>
</head>
<body>

<div class="topbar">
  <div class="in">
    <a href="#" class="brand" onclick="goHome()">
      <div class="dot">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
      </div>
      <div>
        <b>Clinify</b>
        <small>Coleta de Dados</small>
      </div>
    </a>
    <div class="top-right">
      <button class="iconbtn" onclick="goLogin()" title="Acesso Administrativo">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
      </button>
    </div>
  </div>
</div>

<main>
  <!-- Formulário Público -->
  <div id="v-pub">
    <div class="narrow card">
      <div class="header-txt">
        <h2>Nova Coleta</h2>
        <p>Preencha os dados do procedimento</p>
      </div>
      <form id="f-coleta" onsubmit="submitColeta(event)">
        <div class="field">
          <label>Nome do Paciente</label>
          <input type="text" id="i-nome" required autocomplete="off" placeholder="Ex: João da Silva">
        </div>
        <div class="field">
          <label>Prontuário</label>
          <input type="text" id="i-pront" required autocomplete="off" inputmode="numeric" placeholder="Ex: 123456">
        </div>
        <div class="field">
          <label>Conselho Profissional</label>
          <input type="text" id="i-cons" required autocomplete="off" placeholder="Ex: CRM 12345 / Coren...">
        </div>
        <div class="field">
          <label>Justificativa do Procedimento</label>
          <textarea id="i-just" required placeholder="Descreva brevemente a justificativa..."></textarea>
        </div>
        <button type="submit" id="btn-coleta" class="btn">
          <span>Registrar Coleta</span>
        </button>
        <div style="display:flex; align-items:center; justify-content:center; gap:6px; margin-top:20px; font-size:11.5px; color:var(--mut);">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width:14px; height:14px;"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
          Conformidade com a LGPD
        </div>
      </form>
    </div>
  </div>

  <!-- Sucesso -->
  <div id="v-done" class="hide">
    <div class="narrow card done">
      <div class="ok">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
      </div>
      <h2>Registrado com Sucesso!</h2>
      <p class="muted" style="margin-top:8px">O código interno da sua coleta é:</p>
      <div class="proto" id="done-id">#0000</div>
      <button class="btn ghost block" onclick="goHome()">Nova Coleta</button>
    </div>
  </div>

  <!-- Login Admin -->
  <div id="v-login" class="hide">
    <div class="narrow card" style="max-width:380px">
      <div class="header-txt">
        <div class="brand" style="justify-content:center; margin-bottom:16px;">
          <div class="dot" style="background:var(--red-s); color:var(--red)"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg></div>
        </div>
        <h2>Área Restrita</h2>
        <p>Acesso exclusivo para administradores.</p>
      </div>
      <form onsubmit="submitLogin(event)">
        <div class="field">
          <input type="password" id="i-pass" placeholder="Senha" required>
        </div>
        <button type="submit" id="btn-login" class="btn">Acessar Painel</button>
        <button type="button" class="btn ghost block" onclick="goHome()">Voltar</button>
      </form>
    </div>
  </div>

  <!-- Admin Dashboard -->
  <div id="v-admin" class="hide">
    <div class="appbar">
      <h2>CRM Clínico</h2>
      <button class="btn ghost sm" onclick="logout()">Encerrar Sessão</button>
    </div>
    
    <div class="stats">
      <div class="stat">
        <div class="v" id="st-total">-</div>
        <div class="l">Total</div>
      </div>
      <div class="stat">
        <div class="v" id="st-pendentes" style="color:var(--amber)">-</div>
        <div class="l">Pendentes</div>
      </div>
      <div class="stat">
        <div class="v" id="st-concluidas" style="color:var(--green)">-</div>
        <div class="l">Concluídas Hoje</div>
      </div>
    </div>

    <div class="controls">
      <div class="search-bar">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        <input type="text" id="i-search" class="field input" style="margin:0; width:100%" placeholder="Buscar paciente ou ID..." oninput="filterAdmin()">
      </div>
      
      <div class="tabs" id="admin-tabs">
        <button class="on" onclick="setTab('Pendentes')">Pendentes</button>
        <button onclick="setTab('Concluído')">Concluídas</button>
        <button onclick="setTab('Todas')">Todas</button>
      </div>
    </div>

    <div id="admin-content"></div>
  </div>

</main>

<div id="toast"></div>

<script>
const $ = q => document.querySelector(q);
const $$ = q => document.querySelectorAll(q);
const views = ['v-pub', 'v-done', 'v-login', 'v-admin'];

// --- UI Navigation ---
function showView(vid) {
  views.forEach(v => $('#'+v).classList.add('hide'));
  $('#'+vid).classList.remove('hide');
  window.scrollTo(0,0);
}

function goHome() {
  $('#f-coleta').reset();
  showView('v-pub');
}

function goLogin() {
  if (S.adminPass) {
    refreshAdmin();
  } else {
    $('#i-pass').value = '';
    showView('v-login');
    setTimeout(() => $('#i-pass').focus(), 100);
  }
}

function logout() {
  S.adminPass = null;
  goHome();
}

function toast(msg, err) {
  const t = $('#toast');
  t.textContent = msg;
  t.className = err ? 'err show' : 'show';
  setTimeout(() => t.className = '', 3000);
}

// --- RPC Wrapper ---
function rpc(func, ...args) {
  return new Promise((resolve, reject) => {
    google.script.run
      .withSuccessHandler(res => resolve(res))
      .withFailureHandler(err => reject(err))
      [func](...args);
  });
}

// --- State ---
const S = { 
  adminPass: null,
  rawData: [],
  tab: 'Pendentes',
  search: ''
};

// --- Form Logic ---
async function submitColeta(e) {
  e.preventDefault();
  const btn = $('#btn-coleta');
  btn.disabled = true;
  btn.innerHTML = '<div class="spin"></div>';
  soundEffects.submit();

  const data = {
    nome: $('#i-nome').value,
    prontuario: $('#i-pront').value,
    conselho: $('#i-cons').value,
    justificativa: $('#i-just').value
  };

  try {
    const res = await rpc('processForm', data);
    if(res.ok) {
      $('#done-id').textContent = res.id;
      soundEffects.success();
      showView('v-done');
    } else {
      soundEffects.error();
      toast(res.erro || 'Erro ao registrar', true);
    }
  } catch(err) {
    soundEffects.error();
    toast('Falha na comunicação', true);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<span>Registrar Coleta</span>';
  }
}

// --- Admin Logic ---
async function submitLogin(e) {
  e.preventDefault();
  const pass = $('#i-pass').value;
  S.adminPass = pass;
  soundEffects.submit();
  await refreshAdmin(true);
}

async function refreshAdmin(fromLogin = false) {
  const btn = fromLogin ? $('#btn-login') : null;
  if(btn) {
    btn.disabled = true;
    btn.innerHTML = '<div class="spin"></div>';
  }

  try {
    const res = await rpc('getRegistros', S.adminPass);
    if(res.ok) {
      if(fromLogin) soundEffects.success();
      S.rawData = res.data;
      filterAdmin();
      showView('v-admin');
    } else {
      if(fromLogin) {
        soundEffects.error();
        toast(res.erro || 'Senha incorreta', true);
        $('#i-pass').value = '';
        $('#i-pass').focus();
        S.adminPass = null;
      }
    }
  } catch(err) {
    if(fromLogin) {
      soundEffects.error();
      toast('Falha na comunicação', true);
    }
  } finally {
    if(btn) {
      btn.disabled = false;
      btn.innerHTML = 'Acessar Painel';
    }
  }
}

function setTab(tabName) {
  S.tab = tabName;
  $$('#admin-tabs button').forEach(b => {
    b.classList.remove('on');
    if(b.textContent.trim() === (tabName === 'Concluído' ? 'Concluídas' : tabName)) b.classList.add('on');
  });
  filterAdmin();
}

function filterAdmin() {
  S.search = $('#i-search').value.toLowerCase();
  
  if(!S.rawData || S.rawData.length <= 1) {
    renderAdminCards([]);
    return;
  }
  
  const headers = S.rawData[0]; // [ID, Data, Paciente, Prontuario, Conselho, Justificativa, Status]
  // We assume Status is at index 6, but fallback to Pending if undefined
  
  let filtered = [];
  let statTotal = 0;
  let statPend = 0;
  let statConcHoje = 0;
  const todayStr = new Date().toLocaleDateString('pt-BR');

  for(let i = 1; i < S.rawData.length; i++) {
    const r = S.rawData[i];
    statTotal++;
    
    let status = r[6] || 'Pendente';
    if(status === 'Pendente') statPend++;
    
    let dateStr = r[1];
    if(typeof dateStr.toLocaleDateString === 'function') {
      dateStr = dateStr.toLocaleDateString('pt-BR');
    } else {
      dateStr = new Date(r[1]).toLocaleDateString('pt-BR');
    }
    
    if(status === 'Concluído' && dateStr === todayStr) statConcHoje++;
    
    // Tab Filter
    if(S.tab !== 'Todas' && status !== S.tab) continue;
    
    // Search Filter
    if(S.search) {
      const matchName = (r[2]||'').toLowerCase().includes(S.search);
      const matchId = (r[0]||'').toLowerCase().includes(S.search);
      if(!matchName && !matchId) continue;
    }
    
    filtered.push(r);
  }
  
  $('#st-total').textContent = statTotal;
  $('#st-pendentes').textContent = statPend;
  $('#st-concluidas').textContent = statConcHoje;
  
  renderAdminCards(filtered);
}

function renderAdminCards(rows) {
  if(rows.length === 0) {
    $('#admin-content').innerHTML = '<div class="card" style="text-align:center;color:var(--mut);padding:40px">Nenhum registro encontrado para este filtro.</div>';
    return;
  }
  
  let html = '<div class="pgrid">';
  
  // Revert order (newest first)
  for(let i = rows.length - 1; i >= 0; i--) {
    const r = rows[i];
    const id = r[0];
    const rawDate = r[1];
    const nome = r[2];
    const pront = r[3];
    const cons = r[4];
    const just = r[5];
    const status = r[6] || 'Pendente';
    
    let timeStr = '';
    let dateStr = '';
    try {
      const d = new Date(rawDate);
      dateStr = d.toLocaleDateString('pt-BR');
      timeStr = d.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
    }catch(e){}
    
    let badgeClass = 'b-neutral';
    if(status === 'Pendente') badgeClass = 'b-warn';
    if(status === 'Concluído') badgeClass = 'b-ok';

    html += `
      <div class="pcard" id="card-${id.replace('#','')}">
        <div class="top">
          <span class="id">${id}</span>
          <span class="badge ${badgeClass}">${status}</span>
          <span class="date">${dateStr} às ${timeStr}</span>
        </div>
        <b>${nome}</b>
        <div class="info">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10 6H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V8a2 2 0 00-2-2h-5m-4 0V5a2 2 0 114 0v1m-4 0a2 2 0 104 0m-5 8a2 2 0 100-4 2 2 0 000 4zm0 0c1.306 0 2.417.835 2.83 2M9 14a3.001 3.001 0 00-2.83 2M15 11h3m-3 4h2"/></svg>
          Prontuário: ${pront}
        </div>
        <div class="desc">${just}</div>
        <div style="font-size:11px; color:var(--mut); text-transform:uppercase; font-weight:600; letter-spacing:0.04em">Conselho: ${cons}</div>
        
        ${status === 'Pendente' ? `
          <div class="pcard-actions">
            <button class="btn sm success" onclick="changeStatus('${id}', 'Concluído', this)">✔ Concluir</button>
            <button class="btn sm ghost" onclick="changeStatus('${id}', 'Cancelado', this)">Cancelar</button>
          </div>
        ` : ''}
      </div>
    `;
  }
  html += '</div>';

  $('#admin-content').innerHTML = html;
}

async function changeStatus(id, newStatus, btnEl) {
  if(!confirm(`Tem certeza que deseja marcar ${id} como ${newStatus}?`)) return;
  
  const originalHtml = btnEl.innerHTML;
  btnEl.innerHTML = '<div class="spin"></div>';
  btnEl.disabled = true;

  try {
    const res = await rpc('updateStatus', { id, novoStatus: newStatus, senha: S.adminPass });
    if(res.ok) {
      toast(`Registro ${id} atualizado para ${newStatus}`);
      soundEffects.success();
      // Optimistic update locally
      const row = S.rawData.find(r => r[0] === id);
      if(row) row[6] = newStatus;
      filterAdmin(); 
    } else {
      soundEffects.error();
      toast(res.erro || 'Erro ao atualizar', true);
      btnEl.disabled = false;
      btnEl.innerHTML = originalHtml;
    }
  } catch (err) {
    soundEffects.error();
    toast('Falha na comunicação', true);
    btnEl.disabled = false;
    btnEl.innerHTML = originalHtml;
  }
}

// --- Audio ---
let audioCtx = null;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if(audioCtx.state === 'suspended') audioCtx.resume();
}
function playTone(freq, type, duration, vol) {
  if(!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}
const soundEffects = {
  focus: () => playTone(800, 'sine', 0.1, 0.05),
  submit: () => {
    playTone(440, 'triangle', 0.1, 0.1);
    setTimeout(() => playTone(554, 'triangle', 0.2, 0.1), 100);
  },
  success: () => {
    playTone(523.25, 'sine', 0.1, 0.1); 
    setTimeout(() => playTone(659.25, 'sine', 0.1, 0.1), 150); 
    setTimeout(() => playTone(783.99, 'sine', 0.3, 0.1), 300); 
  },
  error: () => {
    playTone(300, 'square', 0.2, 0.1);
    setTimeout(() => playTone(250, 'square', 0.3, 0.1), 200);
  }
};
document.addEventListener('click', initAudio, { once: true });
document.addEventListener('touchstart', initAudio, { once: true });
</script>
